<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block description %}MergeSkills — Plataforma de cursos interativos.{% endblock %}">
    <title>{% block title %}MergeSkills{% endblock %}</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#eef6ff',
                            100: '#d9eaff',
                            200: '#bcdaff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        },
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons — Biblioteca de icones minimalista -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="font-sans text-gray-800 bg-white antialiased">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">

        <nav class="max-w-6xl max-auto px-6 h-16 flex items-center justify-between">

            <a href="/" class="text-lg font-bold text-gray-900 tracking-tight flex items-center gap-2">
            <i data-lucide="graduation-cap" class="w-5 h-5 text-brand-600"></i> 
                MergeSkills
            </a>

            <div class="hidden sm:flex items-center gap-6 text-sm text-gray-500">
                <a href="/#recursos" class="hover:text-gray-900 transition-colors">Recursos</a>
                <a href="/#cursos" class="hover:text-gray-900 transition-colors">Cursos</a>
                <a href="/#tech" class="hover:text-gray-900 transition-colors">Stack</a>
            </div>
        </nav>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-100 mt-20">
        <div class="max-w-6xl mx-auto px-6 py-10 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-400">
            <p>&copy; 2026 MergeSkills - Projeto LDW FATEC</p>
            <div class="flex gap-4">
                <a href="/" class="hover:text-gray-600 transition-colors">Inicio</a>
                <a href="/#cursos" class="hover:text-gray-600 transition-colors">Cursos</a>
                <a href="https://github.com" target="_blank" class="hover:text-gray-600 transition-colors">Github</a>
            </div>
        </div>

    </footer>
    <!-- Inicia os icones com Lucide Icons -->
    <script>lucide.createIcons();</script>
</body>
</html>
